<div class="container-fluid p-4">
  <div class="mb-3">
    <button class="btn btn-secondary" [routerLink]="['/dashboard']">
      <i class="bi bi-arrow-left-short me-1"></i> {{ 'common.backToDashboard' | translate }}
    </button>
  </div>

  <h2 class="mb-4">⚙️ {{ 'settings.title' | translate }}</h2>

  <!-- ==========================
          FORM CẬP NHẬT PROFILE
  =========================== -->
  <form (ngSubmit)="onSaveSettings()">
    
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <h4 class="mb-3">👤 {{ 'settings.myProfile' | translate }}</h4>

        <!-- Avatar -->
        <div class="d-flex align-items-center gap-3 mb-4">
          <img [src]="avatarPreviewUrl || 'assets/default-avatar.png'"
               width="72" height="72"
               class="rounded-circle border object-fit-cover"
               (error)="$any($event.target).src='assets/default-avatar.png'">
          <div class="flex-grow-1">
            <div class="fw-semibold mb-2">{{ 'settings.avatar' | translate }}</div>
            <div class="d-flex flex-wrap gap-2 align-items-center">
              <label class="btn btn-outline-primary btn-sm mb-0">
                <input type="file" hidden accept="image/*" (change)="onAvatarSelected($event)">
                <i class="bi bi-image me-1"></i>{{ 'settings.changeAvatar' | translate }}
              </label>
              <button class="btn btn-primary btn-sm"
                      type="button"
                      (click)="uploadAvatar()"
                      [disabled]="!selectedAvatarFile || uploadingAvatar">
                <ng-container *ngIf="!uploadingAvatar">
                  <i class="bi bi-cloud-arrow-up me-1"></i>{{ 'settings.uploadAvatar' | translate }}
                </ng-container>
                <ng-container *ngIf="uploadingAvatar">
                  <span class="spinner-border spinner-border-sm me-2" role="status"></span>{{ 'settings.uploading' | translate }}
                </ng-container>
              </button>
            </div>
            <small class="text-muted d-block mt-2" *ngIf="selectedAvatarFile">{{ selectedAvatarFile.name }}</small>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">{{ 'settings.username' | translate }}</label>
          <input type="text" [(ngModel)]="profile.username" name="username" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">{{ 'settings.email' | translate }}</label>
          <input type="email" [(ngModel)]="profile.email" name="email" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">{{ 'settings.oldPassword' | translate }}</label>
          <input 
            type="password"
            [(ngModel)]="profile.oldPassword"
            name="oldPassword"
            class="form-control"
            placeholder="{{ 'settings.oldPassword' | translate }}"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">{{ 'settings.newPassword' | translate }}</label>
          <input 
            type="password"
            [(ngModel)]="profile.newPassword"
            name="newPassword"
            class="form-control"
            placeholder="{{ 'settings.newPassword' | translate }}"
          />
        </div>

      </div>
    </div>
    <div class="mb-3">
      <!-- 
        Label sử dụng Pipe dịch tự động để luôn hiển thị đúng ngôn ngữ hiện tại.
        (Giả định bạn có thiết lập Angular Translate)
      -->
      <label class="form-label">{{ 'settings.language' | translate }}</label>
      
      <!-- 
        LỰA CHỌN 1: Hiển thị khi ngôn ngữ ứng dụng hiện tại là Tiếng Anh (en)
        *ngIf vẫn kiểm tra ngôn ngữ hiện tại (settings.defaultLanguage) để hiển thị đúng kiểu dropdown.
        [(ngModel)]="draftLanguage" giữ giá trị tạm thời.
      -->
      <select 
          *ngIf="settings.defaultLanguage === 'en'"
          [(ngModel)]="draftLanguage" 
          name="defaultLanguage" 
          class="form-select"
      >
          <option value="en">English</option>
          <option value="vi">Vietnamese</option>
      </select>
  
      <!-- 
        LỰA CHỌN 2: Hiển thị khi ngôn ngữ ứng dụng hiện tại là Tiếng Việt (vi)
        [(ngModel)]="draftLanguage" giữ giá trị tạm thời.
      -->
      <select 
          *ngIf="settings.defaultLanguage === 'vi'"
          [(ngModel)]="draftLanguage" 
          name="defaultLanguage" 
          class="form-select"
      >
          <option value="vi">Tiếng Việt</option>
          <option value="en">Tiếng Anh</option>
      </select>
  </div>

    <!-- NÚT LƯU TẤT CẢ -->
    <button type="submit" class="btn btn-primary w-100 mb-3">
      {{ 'settings.save' | translate }}
    </button>

  </form>

  <!-- ==========================
          LOGOUT
  =========================== -->
  <button class="btn btn-danger w-100" (click)="onLogout()">
    🔐 {{ 'settings.logout' | translate }}
  </button>

</div>
