<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
    
  <!-- Username Field -->
  <div class="form-group">
    <label>Username</label>
    <input 
      type="text" 
      formControlName="username" 
      class="form-control"
      [class.is-invalid]="f['username'].errors && (f['username'].touched || submitted)" 
    />
    
    <!-- Lỗi Username -->
    <div *ngIf="f['username'].errors && (f['username'].touched || submitted)" class="error-message">
        <div *ngIf="f['username'].errors['required']">
            Username cannot be empty.
        </div>
    </div>
  </div>
  
  <!-- Password Field -->
  <div class="form-group">
    <label>Password</label>
    <input 
      type="password" 
      formControlName="password" 
      class="form-control"
      [class.is-invalid]="f['password'].errors && (f['password'].touched || submitted)" 
    />

    <!-- Lỗi Password -->
    <div *ngIf="f['password'].errors && (f['password'].touched || submitted)" class="error-message">
        <div *ngIf="f['password'].errors['required']">
            Password is required.
        </div>
        <div *ngIf="f['password'].errors['minlength']">
            Password must be at least 6 characters.
        </div>
    </div>
  </div>

  <!-- Confirm Password Field -->
  <div class="form-group">
    <label>Confirm Password</label>
    <input 
      type="password" 
      formControlName="confirmPassword" 
      class="form-control"
      [class.is-invalid]="f['confirmPassword'].errors && (f['confirmPassword'].touched || submitted)" 
    />

    <!-- Lỗi Confirm Password (Required và MustMatch) -->
    <div *ngIf="f['confirmPassword'].errors && (f['confirmPassword'].touched || submitted)" class="error-message">
        <div *ngIf="f['confirmPassword'].errors['required']">
            Confirmation is required.
        </div>
        <div *ngIf="f['confirmPassword'].errors['mustMatch']">
            Passwords do not match.
        </div>
    </div>
  </div>
  
  <!-- Email Field -->
  <div class="form-group">
    <label>Email</label>
    <input 
      type="email" 
      formControlName="email" 
      class="form-control"
      [class.is-invalid]="f['email'].errors && (f['email'].touched || submitted)" 
    />
    
    <!-- Lỗi Email -->
    <div *ngIf="f['email'].errors && (f['email'].touched || submitted)" class="error-message">
        <div *ngIf="f['email'].errors['required']">
            Email is required.
        </div>
        <div *ngIf="f['email'].errors['email']">
            Email must be a valid email address.
        </div>
    </div>
  </div>

  <!-- Thông báo lỗi chung (nếu cần) -->
  <div *ngIf="errorMessage" class="error-message general-alert" style="background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; border-radius: 4px;">
      {{ errorMessage }}
  </div>
  
  <!-- Thông báo thành công -->
  <div *ngIf="successMessage" class="success-message general-alert">
      {{ successMessage }}
  </div>

  <button type="submit" [disabled]="registerForm.invalid && submitted">Register</button>
  <button type="button" (click)="onReset()">Reset</button>
  <button type="button" (click)="cancel()">Cancel</button>
  <button type="button" (click)="gotoDashboard()">Go to Dashboard</button>
</form>
